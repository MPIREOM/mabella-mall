<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mabella Mall — Shop Availability</title>
<style>
  :root {
    --bg: #0a0a0b;
    --bg-elev: #131315;
    --surface: #1a1a1d;
    --border: #2a2a2e;
    --border-strong: #3a3a3f;
    --text: #f2f2f3;
    --text-dim: #9c9ca3;
    --text-faint: #6a6a70;
    --available: #22c55e;
    --occupied: #ef4444;
    --reserved: #f59e0b;
    --radius: 10px;
    --radius-sm: 6px;
  }
  *, *::before, *::after { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Roboto, sans-serif;
    height: 100%; overflow: hidden;
  }
  .mm-root {
    min-height: 100vh;
    display: grid;
    grid-template-columns: 280px 1fr 360px;
    grid-template-rows: 60px 1fr;
    grid-template-areas:
      'header header header'
      'sidebar plan detail';
    height: 100vh;
  }
  @media (max-width: 900px) {
    .mm-root {
      grid-template-columns: 1fr;
      grid-template-rows: 60px auto 1fr;
      grid-template-areas: 'header' 'sidebar' 'plan';
      height: auto; min-height: 100vh;
    }
    .mm-detail {
      position: fixed; inset: 0; z-index: 100;
      transform: translateY(100%);
      transition: transform 260ms cubic-bezier(.22,.61,.36,1);
    }
    .mm-detail.open { transform: translateY(0); }
  }

  .mm-header {
    grid-area: header;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 24px; border-bottom: 1px solid var(--border); background: var(--bg-elev);
  }
  .mm-brand { font-size: 15px; font-weight: 600; letter-spacing: -0.01em; }
  .mm-brand-sub { font-size: 12px; color: var(--text-dim); font-weight: 400; margin-left: 8px; }
  .mm-tabs { display: flex; gap: 4px; }
  .mm-tab {
    background: transparent; border: 1px solid transparent; color: var(--text-dim);
    padding: 6px 14px; font-size: 13px; font-weight: 500;
    border-radius: var(--radius-sm); cursor: pointer; transition: all 120ms;
    font-family: inherit;
  }
  .mm-tab:hover { color: var(--text); background: var(--surface); }
  .mm-tab.active { background: var(--surface); color: var(--text); border-color: var(--border-strong); }

  .mm-sidebar {
    grid-area: sidebar; border-right: 1px solid var(--border);
    padding: 20px; overflow-y: auto; background: var(--bg-elev);
  }
  .mm-section-title {
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em;
    color: var(--text-faint); font-weight: 600; margin: 0 0 12px 0;
  }
  .mm-stat-row {
    display: flex; justify-content: space-between;
    padding: 8px 0; font-size: 13px; border-bottom: 1px solid var(--border);
  }
  .mm-stat-row:last-child { border-bottom: 0; }
  .mm-stat-label { color: var(--text-dim); }
  .mm-stat-value { color: var(--text); font-weight: 500; font-variant-numeric: tabular-nums; }
  .mm-stat-value.avail { color: var(--available); }
  .mm-stat-value.occ { color: var(--occupied); }

  .mm-legend { margin-top: 24px; }
  .mm-legend-item {
    display: flex; align-items: center; gap: 10px;
    padding: 6px 0; font-size: 12px; color: var(--text-dim);
  }
  .mm-legend-swatch {
    width: 12px; height: 12px; border-radius: 3px;
    border: 1px solid rgba(255,255,255,0.1);
  }

  .mm-plan {
    grid-area: plan; position: relative; overflow: hidden;
    display: flex; align-items: center; justify-content: center; padding: 20px;
  }
  .mm-plan-frame {
    position: relative; width: 100%; height: 100%;
    border-radius: var(--radius); background: #ffffff;
    border: 1px solid var(--border); overflow: hidden;
    display: flex; align-items: center; justify-content: center;
  }
  .mm-plan-aspect {
    position: relative; aspect-ratio: 3300 / 2550;
    max-width: 100%; max-height: 100%; width: 100%;
  }
  .mm-plan-img { width: 100%; height: 100%; object-fit: contain; display: block; user-select: none; pointer-events: none; }
  .mm-shop-rect {
    position: absolute; border: 1.5px solid transparent;
    background: rgba(34, 197, 94, 0.08);
    cursor: pointer; transition: all 120ms ease;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.6vw; font-weight: 700; color: transparent;
    overflow: hidden; font-family: inherit;
  }
  .mm-shop-rect:hover {
    background: rgba(255, 255, 255, 0.28);
    border-color: #000; color: #000; z-index: 5;
    box-shadow: 0 0 0 2px rgba(0,0,0,0.06);
  }
  .mm-shop-rect.occupied { background: rgba(239, 68, 68, 0.12); }
  .mm-shop-rect.occupied:hover { background: rgba(239, 68, 68, 0.35); border-color: #b91c1c; }
  .mm-shop-rect.selected {
    background: rgba(0, 0, 0, 0.4) !important;
    border: 2px solid #000 !important;
    color: #fff !important; z-index: 10;
  }

  .mm-detail {
    grid-area: detail; border-left: 1px solid var(--border);
    padding: 24px; background: var(--bg-elev); overflow-y: auto;
  }
  .mm-detail-empty {
    color: var(--text-faint); font-size: 13px;
    display: flex; align-items: center; justify-content: center;
    height: 100%; flex-direction: column; gap: 12px; text-align: center;
  }
  .mm-detail-head {
    display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px;
  }
  .mm-detail-num { font-size: 32px; font-weight: 700; letter-spacing: -0.02em; line-height: 1; }
  .mm-detail-floor {
    font-size: 12px; color: var(--text-dim); margin-top: 6px;
    text-transform: uppercase; letter-spacing: 0.06em;
  }
  .mm-status-pill {
    padding: 4px 10px; border-radius: 999px; font-size: 11px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.05em; border: 1px solid;
  }
  .mm-status-pill.available {
    color: var(--available); border-color: rgba(34,197,94,0.35); background: rgba(34,197,94,0.1);
  }
  .mm-status-pill.occupied {
    color: var(--occupied); border-color: rgba(239,68,68,0.35); background: rgba(239,68,68,0.1);
  }
  .mm-status-pill.reserved {
    color: var(--reserved); border-color: rgba(245,158,11,0.35); background: rgba(245,158,11,0.1);
  }
  .mm-detail-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 1px;
    background: var(--border); border: 1px solid var(--border);
    border-radius: var(--radius); overflow: hidden; margin-bottom: 20px;
  }
  .mm-detail-cell { background: var(--bg-elev); padding: 14px; }
  .mm-detail-cell-label {
    font-size: 11px; color: var(--text-faint);
    text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px;
  }
  .mm-detail-cell-value {
    font-size: 16px; font-weight: 600; color: var(--text); font-variant-numeric: tabular-nums;
  }
  .mm-detail-cell-sub { font-size: 11px; color: var(--text-dim); margin-top: 2px; }
  .mm-detail-inquiry {
    display: block; width: 100%; padding: 12px;
    background: var(--text); color: var(--bg); border: 0;
    border-radius: var(--radius-sm); font-size: 13px; font-weight: 600;
    cursor: pointer; text-decoration: none; text-align: center;
    transition: opacity 120ms; font-family: inherit;
  }
  .mm-detail-inquiry:hover { opacity: 0.9; }
  .mm-loading {
    display: flex; align-items: center; justify-content: center;
    height: 100%; color: var(--text-dim); font-size: 13px;
  }
</style>
</head>
<body>
<div class="mm-root">
  <header class="mm-header">
    <div><span class="mm-brand">Mabella Mall</span><span class="mm-brand-sub">Shop Availability</span></div>
    <div class="mm-tabs" id="tabs"></div>
    <div style="width: 120px; text-align: right; font-size: 12px; color: var(--text-dim)">Muscat, Oman</div>
  </header>

  <aside class="mm-sidebar">
    <h3 class="mm-section-title">Floor Summary</h3>
    <div id="stats"></div>
    <div class="mm-legend">
      <h3 class="mm-section-title">Zones</h3>
      <div id="legend"></div>
    </div>
    <div class="mm-legend">
      <h3 class="mm-section-title">Status</h3>
      <div class="mm-legend-item">
        <span class="mm-legend-swatch" style="background: rgba(34,197,94,0.4)"></span>
        <span>Available — click for details</span>
      </div>
      <div class="mm-legend-item">
        <span class="mm-legend-swatch" style="background: rgba(239,68,68,0.4)"></span>
        <span>Occupied</span>
      </div>
    </div>
  </aside>

  <main class="mm-plan">
    <div class="mm-plan-frame" id="planFrame">
      <div class="mm-loading">Loading floor plan…</div>
    </div>
  </main>

  <aside class="mm-detail" id="detailPanel">
    <div class="mm-detail-empty">
      <div>Click any shop on the floor plan<br>to view availability and details</div>
    </div>
  </aside>
</div>

<script>
  // -------------------------------------------------------------------
  //  CONFIG — fill in your Supabase credentials
  // -------------------------------------------------------------------
  const SUPABASE_URL = 'https://pebwuauoqkgsfdrxqcap.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBlYnd1YXVvcWtnc2ZkcnhxY2FwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2Mzk0NzgsImV4cCI6MjA5MjIxNTQ3OH0.CK2q9MftB0_cFw7ZMoLFIq2F0E1L-bAeJ8nhANNff0E';
  const WHATSAPP_PHONE = '96879288000';
  const FLOOR_IMAGES = {
    ground: './ground.png',
    first:  './first.png',
    second: './second.png',
  };

  // -------------------------------------------------------------------
  //  Constants & math
  // -------------------------------------------------------------------
  const MB_W = 612, MB_H = 792;
  const IMG_W = 3300, IMG_H = 2550;
  const PTS_PER_CM_X = 0.061;
  const PTS_PER_CM_Y = 0.057;

  const FLOOR_META = {
    ground: 'Ground Floor',
    first:  'First Floor',
    second: 'Second Floor',
  };

  const ZONE_LABELS = {
    active: 'Active Zone',
    semi_active: 'Semi-active',
    dead1: 'Dead Zone 1',
    dead2: 'Dead Zone 2',
    restaurant: 'Restaurants',
    anchor: 'Anchor Store',
  };

  const ZONE_COLORS = {
    active: '#ff2bd6',
    semi_active: '#74d948',
    dead1: '#34d4f7',
    dead2: '#fbe64b',
    restaurant: '#ff7a7a',
    anchor: '#aaaaaa',
  };

  function mbToPixel(mb_x, mb_y) {
    return {
      px: (mb_y * IMG_W) / MB_H,
      py: ((MB_W - mb_x) * IMG_H) / MB_W,
    };
  }

  function shopRect(shop) {
    const { px, py } = mbToPixel(shop.label_cx, shop.label_cy);
    const wCm = shop.width_cm || 500;
    const hCm = shop.height_cm || 500;
    const wPx = wCm * PTS_PER_CM_X * (IMG_W / MB_H);
    const hPx = hCm * PTS_PER_CM_Y * (IMG_H / MB_W);
    return {
      left: (px - wPx / 2) / IMG_W,
      top: (py - hPx / 2) / IMG_H,
      width: wPx / IMG_W,
      height: hPx / IMG_H,
    };
  }

  function formatOMR(n) {
    if (n == null) return '—';
    return new Intl.NumberFormat('en-OM', {
      style: 'currency', currency: 'OMR',
      minimumFractionDigits: 0, maximumFractionDigits: 3,
    }).format(n);
  }

  // -------------------------------------------------------------------
  //  State
  // -------------------------------------------------------------------
  let allShops = [];
  let currentFloor = 'first';
  let selectedId = null;

  // -------------------------------------------------------------------
  //  Rendering
  // -------------------------------------------------------------------
  function renderTabs() {
    const el = document.getElementById('tabs');
    el.innerHTML = '';
    Object.keys(FLOOR_META).forEach(f => {
      const btn = document.createElement('button');
      btn.className = 'mm-tab' + (currentFloor === f ? ' active' : '');
      btn.textContent = FLOOR_META[f];
      btn.onclick = () => { currentFloor = f; selectedId = null; renderAll(); };
      el.appendChild(btn);
    });
  }

  function renderStats() {
    const floorShops = allShops.filter(s => s.floor === currentFloor);
    const counts = { total: floorShops.length, available: 0, occupied: 0, reserved: 0 };
    floorShops.forEach(s => counts[s.status]++);
    const el = document.getElementById('stats');
    el.innerHTML = `
      <div class="mm-stat-row"><span class="mm-stat-label">Total shops</span><span class="mm-stat-value">${counts.total}</span></div>
      <div class="mm-stat-row"><span class="mm-stat-label">Available</span><span class="mm-stat-value avail">${counts.available}</span></div>
      <div class="mm-stat-row"><span class="mm-stat-label">Occupied</span><span class="mm-stat-value occ">${counts.occupied}</span></div>
      ${counts.reserved > 0 ? `<div class="mm-stat-row"><span class="mm-stat-label">Reserved</span><span class="mm-stat-value">${counts.reserved}</span></div>` : ''}
    `;
  }

  function renderLegend() {
    const el = document.getElementById('legend');
    el.innerHTML = Object.keys(ZONE_LABELS).map(z => `
      <div class="mm-legend-item">
        <span class="mm-legend-swatch" style="background: ${ZONE_COLORS[z]}"></span>
        <span>${ZONE_LABELS[z]}</span>
      </div>
    `).join('');
  }

  function renderPlan() {
    const frame = document.getElementById('planFrame');
    frame.innerHTML = '';
    const aspect = document.createElement('div');
    aspect.className = 'mm-plan-aspect';
    const img = document.createElement('img');
    img.className = 'mm-plan-img';
    img.src = FLOOR_IMAGES[currentFloor];
    img.alt = FLOOR_META[currentFloor];
    aspect.appendChild(img);

    allShops.filter(s => s.floor === currentFloor).forEach(shop => {
      const r = shopRect(shop);
      const btn = document.createElement('button');
      btn.type = 'button';
      let cls = 'mm-shop-rect';
      if (shop.status === 'occupied') cls += ' occupied';
      if (shop.status === 'reserved') cls += ' reserved';
      if (selectedId === shop.id) cls += ' selected';
      btn.className = cls;
      btn.style.left = (r.left * 100) + '%';
      btn.style.top = (r.top * 100) + '%';
      btn.style.width = (r.width * 100) + '%';
      btn.style.height = (r.height * 100) + '%';
      btn.title = `${shop.shop_number} · ${shop.area_sqm ?? '—'} m²`;
      btn.textContent = shop.shop_number;
      btn.onclick = () => { selectedId = shop.id; renderAll(); };
      aspect.appendChild(btn);
    });

    frame.appendChild(aspect);
  }

  function renderDetail() {
    const el = document.getElementById('detailPanel');
    const shop = allShops.find(s => s.id === selectedId);
    if (!shop) {
      el.classList.remove('open');
      el.innerHTML = `
        <div class="mm-detail-empty">
          <div>Click any shop on the floor plan<br>to view availability and details</div>
        </div>
      `;
      return;
    }
    el.classList.add('open');
    const dims = (shop.width_cm && shop.height_cm)
      ? `${(shop.width_cm/100).toFixed(2)} × ${(shop.height_cm/100).toFixed(2)} m`
      : '';
    const rentPerSqm = shop.rent_per_sqm
      ? `<div class="mm-detail-cell-sub">${formatOMR(shop.rent_per_sqm)} / m²</div>`
      : '';
    const inquiry = shop.status === 'available' ? `
      <a class="mm-detail-inquiry"
         href="https://wa.me/${WHATSAPP_PHONE}?text=${encodeURIComponent(
           `Hi, I'm interested in shop ${shop.shop_number} (${FLOOR_META[shop.floor]}, ${shop.area_sqm ?? '—'} m²) at Mabella Mall.`
         )}"
         target="_blank" rel="noopener noreferrer">
        Inquire via WhatsApp
      </a>` : '';
    const notes = shop.notes ? `
      <div style="font-size:13px;color:var(--text-dim);line-height:1.5;margin-bottom:20px;padding:14px;background:var(--surface);border-radius:var(--radius-sm);border:1px solid var(--border)">${shop.notes}</div>
    ` : '';
    el.innerHTML = `
      <div class="mm-detail-head">
        <div>
          <div class="mm-detail-num">${shop.shop_number}</div>
          <div class="mm-detail-floor">${FLOOR_META[shop.floor]}${shop.zone ? ' · ' + ZONE_LABELS[shop.zone] : ''}</div>
        </div>
        <span class="mm-status-pill ${shop.status}">${shop.status}</span>
      </div>
      <div class="mm-detail-grid">
        <div class="mm-detail-cell">
          <div class="mm-detail-cell-label">Area</div>
          <div class="mm-detail-cell-value">${shop.area_sqm ?? '—'} m²</div>
          ${dims ? `<div class="mm-detail-cell-sub">${dims}</div>` : ''}
        </div>
        <div class="mm-detail-cell">
          <div class="mm-detail-cell-label">Monthly rent</div>
          <div class="mm-detail-cell-value">${formatOMR(shop.monthly_rent)}</div>
          ${rentPerSqm}
        </div>
        <div class="mm-detail-cell">
          <div class="mm-detail-cell-label">Shop number</div>
          <div class="mm-detail-cell-value">${shop.shop_number}</div>
        </div>
        <div class="mm-detail-cell">
          <div class="mm-detail-cell-label">Floor</div>
          <div class="mm-detail-cell-value">${FLOOR_META[shop.floor].replace(' Floor', '')}</div>
        </div>
      </div>
      ${notes}
      ${inquiry}
    `;
  }

  function renderAll() {
    renderTabs();
    renderStats();
    renderPlan();
    renderDetail();
  }

  // -------------------------------------------------------------------
  //  Data loading + realtime
  // -------------------------------------------------------------------
  async function loadShops() {
    try {
      const url = SUPABASE_URL + '/rest/v1/shops?select=*&order=shop_number.asc';
      const res = await fetch(url, {
        headers: {
          'apikey': SUPABASE_ANON_KEY,
          'Authorization': 'Bearer ' + SUPABASE_ANON_KEY,
        },
      });
      if (!res.ok) {
        const text = await res.text();
        throw new Error('HTTP ' + res.status + ': ' + text);
      }
      allShops = await res.json();
      console.log('Loaded', allShops.length, 'shops');
      renderAll();
      pollForChanges();
    } catch (e) {
      console.error('Error loading shops:', e);
      document.getElementById('planFrame').innerHTML =
        '<div class="mm-loading" style="flex-direction:column;gap:8px;padding:20px;text-align:center;color:#ef4444">' +
        '<strong>Could not load shops</strong>' +
        '<span style="font-size:12px;color:var(--text-dim)">' + (e && e.message ? e.message : String(e)) + '</span>' +
        '</div>';
    }
  }

  // Poll every 30s for status/rent changes (simpler than WebSocket, works everywhere)
  function pollForChanges() {
    setInterval(async () => {
      try {
        const url = SUPABASE_URL + '/rest/v1/shops?select=*&order=shop_number.asc';
        const res = await fetch(url, {
          headers: {
            'apikey': SUPABASE_ANON_KEY,
            'Authorization': 'Bearer ' + SUPABASE_ANON_KEY,
          },
        });
        if (!res.ok) return;
        const fresh = await res.json();
        // Only re-render if data changed
        if (JSON.stringify(fresh) !== JSON.stringify(allShops)) {
          allShops = fresh;
          renderAll();
        }
      } catch (e) {
        // Silent fail on poll errors — page still works
      }
    }, 30000);
  }

  renderLegend();
  loadShops();
</script>
</body>
</html>
